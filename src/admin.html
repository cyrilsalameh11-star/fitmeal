<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMeal AI — Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfaf8; }
        h1, h2 { font-family: 'Merriweather', serif; }
        .amber-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body class="min-h-screen text-stone-900 selection:bg-amber-100">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-10 px-6 py-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-stone-900 rounded-xl flex items-center justify-center text-white font-serif italic text-xl shadow-lg">F</div>
                <h1 class="text-2xl font-black tracking-tight">Admin <span class="text-stone-400 italic font-normal">Intelligence</span></h1>
            </div>
            <div id="user-count-badge" class="bg-stone-100 px-4 py-1.5 rounded-full border border-stone-200 text-[10px] font-bold uppercase tracking-widest text-stone-500 flex items-center">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-2 animate-pulse"></div>
                <span id="user-total">0</span> Users Active
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-16 space-y-12">
        <div class="space-y-4">
            <h2 class="text-4xl lg:text-5xl leading-tight">User <span class="italic font-normal text-stone-400">Activity Log.</span></h2>
            <p class="text-stone-500 font-medium text-lg max-w-2xl">Monitor real-time engagement and track unique visitors across all regional hubs.</p>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="p-10 bg-white border border-stone-100 rounded-3xl shadow-sm amber-glow">
                <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-2">Total Participants</p>
                <p id="stat-total" class="text-6xl font-black text-stone-900">0</p>
            </div>
            <div class="p-10 bg-white border border-stone-100 rounded-3xl shadow-sm">
                <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-2">Platform Status</p>
                <p class="text-2xl font-bold text-emerald-600 flex items-center uppercase tracking-wide">
                    Online
                </p>
            </div>
            <div class="p-10 bg-stone-900 rounded-3xl shadow-xl text-white">
                <p class="text-[10px] font-bold uppercase tracking-widest text-stone-500 mb-2">Last Sync</p>
                <p id="last-sync" class="text-lg font-serif italic">Just now</p>
            </div>
        </div>

        <!-- User List -->
        <div class="bg-white border border-stone-100 rounded-[2rem] overflow-hidden shadow-sm">
            <div class="px-10 py-8 border-b border-stone-50 flex justify-between items-center">
                <h3 class="text-xl font-bold uppercase tracking-widest text-stone-400 text-xs">Registered Identifiers</h3>
                <button onclick="loadUsers()" class="p-2 hover:bg-stone-50 rounded-full transition-colors text-stone-400 hover:text-stone-900">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <div id="user-list" class="divide-y divide-stone-50">
                <!-- User rows will be injected here -->
                <div class="p-12 text-center text-stone-400 italic">Connecting to cloud database...</div>
            </div>
        </div>
    </main>

    <script>
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                const list = document.getElementById('user-list');
                const totalSpan = document.getElementById('user-total');
                const statTotal = document.getElementById('stat-total');
                const lastSync = document.getElementById('last-sync');

                if (data.users && data.users.length > 0) {
                    list.innerHTML = data.users.map((name, index) => `
                        <div class="px-10 py-6 flex items-center justify-between hover:bg-stone-50 transition-colors">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 bg-stone-100 rounded-full flex items-center justify-center text-stone-400 font-bold uppercase text-xs">
                                    ${name.charAt(0)}
                                </div>
                                <div>
                                    <p class="text-lg font-bold text-stone-800">${name}</p>
                                    <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Unique Identifier #${1000 + index}</p>
                                </div>
                            </div>
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold uppercase tracking-widest rounded-full border border-emerald-100 italic">Active</span>
                        </div>
                    `).join('');
                    totalSpan.innerText = data.users.length;
                    statTotal.innerText = data.users.length;
                } else {
                    list.innerHTML = '<div class="p-12 text-center text-stone-400 italic">No users found in the log.</div>';
                }
                lastSync.innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                document.getElementById('user-list').innerHTML = '<div class="p-12 text-center text-red-400 italic">Technical error: Unable to retrieve logs.</div>';
            }
        }

        loadUsers();
        setInterval(loadUsers, 30000); // Auto refresh every 30s
    </script>
</body>
</html>
