<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMeal Admin — Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fdfdfd; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 sm:p-8">
    
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 text-center">
            <h1 class="text-3xl font-800 tracking-tight text-stone-900">Admin Access</h1>
            <div id="login-box" class="space-y-4">
                <input type="password" id="password-input" placeholder="Password" class="w-full px-6 py-4 rounded-2xl border border-stone-100 bg-stone-50 focus:ring-2 focus:ring-stone-900 outline-none transition-all text-center text-xl font-bold">
                <button onclick="login()" id="login-btn" class="w-full py-4 bg-stone-900 text-white rounded-2xl font-bold hover:bg-stone-800 transition-all">Unlock Dashboard</button>
                <p id="error-msg" class="text-red-500 text-sm font-medium hidden">Incorrect password.</p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="max-w-4xl mx-auto hidden fade-in">
        <div class="flex items-center justify-between mb-12">
            <div>
                <h1 class="text-2xl font-800 text-stone-900">User Directory</h1>
                <p class="text-stone-400 font-medium">Tracking <span id="user-count" class="text-stone-900 font-bold">0</span> total visitors</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="resetDatabase()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-xl hover:bg-red-600 hover:text-white transition-all text-sm font-bold">Reset Database</button>
                <button onclick="logout()" class="px-4 py-2 border border-stone-100 rounded-xl text-stone-400 hover:text-stone-900 hover:border-stone-200 transition-all text-sm font-bold">Logout</button>
            </div>
        </div>

        <div class="bg-white border border-stone-100 rounded-3xl overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-stone-50 bg-stone-50/50">
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-stone-400">First Name / Nickname</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-stone-400">Last Active</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Users injected here -->
                </tbody>
            </table>
            <div id="empty-state" class="p-20 text-center text-stone-300 italic hidden">No users found.</div>
        </div>
        
        <p class="mt-8 text-center text-[10px] font-black uppercase tracking-widest text-stone-200">FitMeal Engine v1.0 • Auto-refreshing</p>
    </div>

    <script>
        // Check session on load
        async function checkSession() {
            const r = await fetch('/api/admin/check');
            const d = await r.json();
            if (d.authenticated) showDashboard();
        }
        checkSession();

        async function login() {
            const btn = document.getElementById('login-btn');
            const password = document.getElementById('password-input').value;
            btn.innerText = 'Verifying...';
            
            try {
                const r = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const d = await r.json();
                if (d.success) {
                    location.reload();
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
            btn.innerText = 'Unlock Dashboard';
        }

        async function logout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            location.reload();
        }

        async function resetDatabase() {
            if (!confirm("Are you sure you want to permanently delete ALL users, visitors, and MAP PINS? This cannot be undone.")) return;
            try {
                const r = await fetch('/api/admin/users/reset', { method: 'DELETE' });
                const d = await r.json();
                if (d.success) {
                    alert("Database and Map Pins have been reset. User count is now 0.");
                    loadUsers();
                } else {
                    alert("Error resetting database: " + (d.error || 'Unknown error'));
                }
            } catch(e) {
                console.error(e);
                alert("Network error.");
            }
        }

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadUsers();
            setInterval(loadUsers, 10000);
        }

        async function loadUsers() {
            try {
                const r = await fetch('/api/admin/users');
                const d = await r.json();
                const tbody = document.getElementById('user-table-body');
                const countEl = document.getElementById('user-count');
                
                if (d.users && d.users.length > 0) {
                    countEl.innerText = d.users.length;
                    tbody.innerHTML = d.users.map(u => {
                        const name = typeof u === 'string' ? u : (u.name || 'Anonymous');
                        const lastLogin = (u.last_login) 
                            ? new Date(u.last_login).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' })
                            : 'Unknown';
                        
                        return `
                            <tr class="border-b border-stone-50 hover:bg-stone-50/50 transition-colors">
                                <td class="px-8 py-6">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-[10px] font-black text-stone-400 uppercase">${name.charAt(0)}</div>
                                        <span class="font-bold text-stone-800">${name}</span>
                                    </div>
                                </td>
                                <td class="px-8 py-6 text-sm font-medium text-stone-500">${lastLogin}</td>
                            </tr>
                        `;
                    }).join('');
                    document.getElementById('empty-state').classList.add('hidden');
                } else {
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
