<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — FitMeal</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background: #0a0a0b; color: #fff; padding: 2rem; font-family: 'Inter', sans-serif; }
    .admin-container { max-width: 800px; margin: 0 auto; }
    .user-list { background: rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
    .user-item { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .user-item:last-child { border-bottom: none; }
    .count-badge { background: var(--primary); color: #000; padding: 0.25rem 0.75rem; border-radius: 1rem; font-weight: bold; }
    h1 { margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1><span>🔒</span> Editor Dashboard <span class="count-badge" id="totalCount">0</span></h1>
    
    <div class="user-list" id="userList">
      <p style="color: var(--text-muted)">Loading users...</p>
    </div>

    <div style="margin-top: 2rem;">
        <a href="/" class="btn-secondary" style="text-decoration: none;">← Back to App</a>
    </div>
  </div>

  <script>
    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users');
        const data = await res.json();
        const list = document.getElementById('userList');
        const count = document.getElementById('totalCount');
        
        count.textContent = data.users.length;
        
        if (data.users.length === 0) {
          list.innerHTML = '<p style="color: var(--text-muted)">No users have signed in yet.</p>';
          return;
        }

        list.innerHTML = data.users.map((name, i) => `
          <div class="user-item">
            <span><strong>${i + 1}.</strong> ${name}</span>
            <span style="color: var(--text-muted); font-size: 0.8rem;">Active User</span>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('userList').innerHTML = '<p style="color: var(--error-color)">Failed to load users.</p>';
      }
    }
    loadUsers();
  </script>
</body>
</html>
