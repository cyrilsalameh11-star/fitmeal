<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMeal — Meal Planner Fitness</title>
  <meta name="description" content="Planifiez vos repas fitness avec des données de supermarchés français (Carrefour, Monoprix) et restaurants (McDonald's, Subway, KFC…). Calories, protéines, glucides, lipides." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="logo">
        <span class="logo-icon">🥗</span>
        <span class="logo-text">FitMeal</span>
      </div>
      <h1 class="hero-title">Repas sur mesure<br /><span class="gradient-text">pour vos objectifs</span></h1>
      <p class="hero-subtitle">Supermarchés français, restaurants, USDA — 3 suggestions adaptées à vos macros</p>
    </div>
  </header>

  <!-- Main App -->
  <main class="app-main">
    <!-- Input Form -->
    <section class="form-section card" id="formCard">
      <h2 class="section-title">Vos objectifs</h2>
      <form id="mealForm" novalidate>
        <div class="form-grid">
          <!-- Calorie Target -->
          <div class="form-group">
            <label for="calorieTarget" class="form-label">
              <span class="label-icon">🔥</span> Calories cibles
            </label>
            <div class="input-wrapper">
              <input
                type="number"
                id="calorieTarget"
                name="calorieTarget"
                class="form-input"
                placeholder="ex. 600"
                min="50"
                max="3000"
                required
                aria-describedby="calorieHint"
              />
              <span class="input-unit">kcal</span>
            </div>
            <span class="input-hint" id="calorieHint">Entre 50 et 3000 kcal</span>
          </div>

          <!-- Protein Target -->
          <div class="form-group">
            <label for="proteinTarget" class="form-label">
              <span class="label-icon">💪</span> Protéines cibles
            </label>
            <div class="input-wrapper">
              <input
                type="number"
                id="proteinTarget"
                name="proteinTarget"
                class="form-input"
                placeholder="ex. 40"
                min="1"
                max="300"
                required
                aria-describedby="proteinHint"
              />
              <span class="input-unit">g</span>
            </div>
            <span class="input-hint" id="proteinHint">Entre 1 et 300 g</span>
          </div>

          <!-- Meal Type -->
          <div class="form-group full-width">
            <label class="form-label">
              <span class="label-icon">🍽️</span> Type de repas
            </label>
            <div class="meal-type-group" role="radiogroup" aria-label="Type de repas">
              <label class="meal-type-option" for="typeLunch">
                <input type="radio" id="typeLunch" name="mealType" value="lunch" />
                <span class="meal-type-card">
                  <span class="meal-type-icon">☀️</span>
                  <span class="meal-type-label">Déjeuner</span>
                </span>
              </label>
              <label class="meal-type-option" for="typeDinner">
                <input type="radio" id="typeDinner" name="mealType" value="dinner" checked />
                <span class="meal-type-card">
                  <span class="meal-type-icon">🌙</span>
                  <span class="meal-type-label">Dîner</span>
                </span>
              </label>
              <label class="meal-type-option" for="typeSnack">
                <input type="radio" id="typeSnack" name="mealType" value="snack" />
                <span class="meal-type-card">
                  <span class="meal-type-icon">🍎</span>
                  <span class="meal-type-label">Snack</span>
                </span>
              </label>
            </div>
          </div>
        </div>

        <!-- Error Message -->
        <div class="form-error hidden" id="formError" role="alert"></div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Trouver mes repas</span>
          <span class="btn-icon">→</span>
        </button>
      </form>
    </section>

    <!-- Results Section -->
    <section class="results-section hidden" id="resultsSection">
      <div class="results-header">
        <h2 class="section-title">Vos suggestions</h2>
        <p class="results-meta" id="resultsMeta"></p>
      </div>

      <!-- Meal Cards Grid -->
      <div class="meals-grid" id="mealsGrid">
        <!-- Cards injected by JS -->
      </div>

      <button class="btn-secondary" id="searchAgainBtn">
        ← Modifier mes objectifs
      </button>
    </section>
  </main>

  <!-- Shopping List Modal -->
  <div class="modal-overlay hidden" id="shopModal" role="dialog" aria-modal="true" aria-labelledby="shopModalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="shopModalTitle">🛒 Liste de courses</h3>
        <button class="modal-close" id="shopModalClose" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body" id="shopModalBody">
        <!-- Items injected by JS -->
      </div>
      <div class="modal-footer">
        <p class="modal-note">Disponible dans votre supermarché habituel</p>
      </div>
    </div>
  </div>

  <!-- Skeleton template (hidden) -->
  <template id="skeletonTemplate">
    <div class="meal-card skeleton-card">
      <div class="skeleton-line skeleton-title"></div>
      <div class="skeleton-line skeleton-brand"></div>
      <div class="skeleton-macros">
        <div class="skeleton-macro"></div>
        <div class="skeleton-macro"></div>
        <div class="skeleton-macro"></div>
        <div class="skeleton-macro"></div>
      </div>
      <div class="skeleton-bars">
        <div class="skeleton-bar"></div>
        <div class="skeleton-bar"></div>
        <div class="skeleton-bar"></div>
      </div>
    </div>
  </template>

  <script src="/js/app.js"></script>
</body>
</html>
